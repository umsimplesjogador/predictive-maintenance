name: Render API Auto-Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy Webhook
        run: |
          echo "Triggering Render Service Deployment..."
          # Aqui ficaria a chamada webhook do service ID do render:
          # curl -X POST https://api.render.com/deploy/srv-<seuid>?key=<suachave>
          echo "Simulated Render auto-deploy triggered successfully."
